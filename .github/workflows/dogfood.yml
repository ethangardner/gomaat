name: Dogfood Diff

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin v6.0.3
        with:
          ref: main
          fetch-depth: 0
          path: main

      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          path: pr

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # pin v6.4.0
        with:
          go-version-file: main/go.mod

      - name: Build gomaat from main
        run: make -C main build

      - name: Build gomaat from PR
        run: make -C pr build

      - name: Generate shared log from main branch history
        run: main/bin/gomaat generate-log --path main --outfile gomaat.log

      - name: Run analyses with main build
        run: |
          mkdir -p out/main out/pr
          main/bin/gomaat summary -l gomaat.log -o out/main/summary.csv
          main/bin/gomaat revisions -l gomaat.log -o out/main/revisions.csv
          main/bin/gomaat authors -l gomaat.log -o out/main/authors.csv
          main/bin/gomaat coupling -l gomaat.log -n 2 -m 2 -i 10 -o out/main/coupling.csv
          main/bin/gomaat cloc --path main -o out/main/cloc.csv

      - name: Run analyses with PR build
        run: |
          pr/bin/gomaat summary -l gomaat.log -o out/pr/summary.csv
          pr/bin/gomaat revisions -l gomaat.log -o out/pr/revisions.csv
          pr/bin/gomaat authors -l gomaat.log -o out/pr/authors.csv
          pr/bin/gomaat coupling -l gomaat.log -n 2 -m 2 -i 10 -o out/pr/coupling.csv
          pr/bin/gomaat cloc --path main -o out/pr/cloc.csv

      - name: Diff outputs
        id: diff
        run: |
          # Row order within each analysis isn't guaranteed to be stable across
          # processes (map iteration order), so sort before comparing. No -r
          # limit is used above so the compared sets are complete and deterministic.
          changed=false
          : > diff.txt
          for f in summary revisions authors coupling cloc; do
            if ! diff -u -L "main/$f.csv" -L "pr/$f.csv" <(sort "out/main/$f.csv") <(sort "out/pr/$f.csv") > /tmp/diff-$f.txt; then
              changed=true
              {
                echo "### $f"
                echo '```diff'
                cat /tmp/diff-$f.txt
                echo '```'
                echo
              } >> diff.txt
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          if [ "$changed" = "true" ]; then
            head -c 50000 diff.txt > diff.trunc.txt
            mv diff.trunc.txt diff.txt
          fi

      - name: Build comment body
        run: |
          {
            echo "## gomaat dogfood diff"
            echo
            echo "Comparison of \`gomaat\` analyses run against \`main\`'s git history,"
            echo "using a build of \`main\` vs. a build of this PR."
            echo
            if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "**Result: analysis output differs.** This is informational only."
              echo
              cat diff.txt
            else
              echo "**Result: no difference in analysis output.**"
            fi
          } > comment.md

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # pin v3.0.4
        with:
          header: gomaat-dogfood
          path: comment.md
